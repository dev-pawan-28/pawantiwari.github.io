<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3a 50%, #0d0d1f 100%);
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(ellipse at center, rgba(20, 10, 60, 0.5) 0%, rgba(5, 5, 15, 1) 100%);
        }

        /* Nebula Glow Background */
        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse 800px 400px at 20% 30%, rgba(138, 43, 226, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse 600px 300px at 80% 70%, rgba(30, 144, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse 700px 350px at 50% 50%, rgba(220, 20, 60, 0.1) 0%, transparent 50%);
            filter: blur(40px);
            pointer-events: none;
        }

        /* Parallax Star Layers */
        .stars-layer {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 60px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 50px 50px, #ddd, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 10px, #eee, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            background-position: 0 0;
            opacity: 0.9;
            animation: twinkle 5s infinite;
        }

        .stars-layer.layer-2 {
            background-size: 300px 300px;
            opacity: 0.6;
            animation: twinkle 7s infinite;
            transform: translateZ(0) translateY(10px);
        }

        .stars-layer.layer-3 {
            background-size: 400px 400px;
            opacity: 0.4;
            animation: twinkle 9s infinite;
            transform: translateZ(0) translateY(20px);
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* Space Telescope */
        .telescope {
            position: absolute;
            width: 120px;
            height: 100px;
            left: 10%;
            top: 30%;
            animation: telescopePath 20s infinite ease-in-out;
            filter: drop-shadow(0 0 10px rgba(138, 43, 226, 0.8));
        }

        .telescope-body {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #333 0%, #555 50%, #222 100%);
            border-radius: 10px;
            box-shadow: 
                inset 0 2px 4px rgba(255, 255, 255, 0.3),
                0 0 20px rgba(138, 43, 226, 0.6);
        }

        .telescope-tube {
            position: absolute;
            width: 30px;
            height: 80px;
            background: linear-gradient(90deg, #444 0%, #666 50%, #444 100%);
            border-radius: 50%;
            top: 10px;
            left: 45px;
            transform: rotate(-35deg);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.5);
        }

        .telescope-mirror {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #aaa 0%, #888 100%);
            border-radius: 50%;
            top: 5px;
            left: 5px;
            box-shadow: 
                inset 0 2px 4px rgba(0, 0, 0, 0.8),
                0 0 10px rgba(100, 200, 255, 0.8);
        }

        .telescope-stand {
            position: absolute;
            width: 15px;
            height: 30px;
            background: linear-gradient(90deg, #555 0%, #777 50%, #555 100%);
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 3px;
        }

        @keyframes telescopePath {
            0% {
                left: 10%;
                top: 30%;
                transform: scale(1);
            }
            25% {
                left: 30%;
                top: 20%;
                transform: scale(1.1) rotateY(10deg);
            }
            50% {
                left: 50%;
                top: 35%;
                transform: scale(1);
            }
            75% {
                left: 25%;
                top: 50%;
                transform: scale(0.9) rotateY(-15deg);
            }
            100% {
                left: 10%;
                top: 30%;
                transform: scale(1);
            }
        }

        /* Shooting Stars */
        .shooting-star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: radial-gradient(ellipse at center, #fff, rgba(255, 255, 255, 0));
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        .shooting-star::before {
            content: '';
            position: absolute;
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, #fff, transparent);
            left: -150px;
            top: -0.5px;
            filter: blur(1px);
        }

        /* Rotating Earth */
        .earth-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #87ceeb, #1e90ff);
            box-shadow: 
                0 0 20px rgba(30, 144, 255, 0.8),
                inset -2px -2px 5px rgba(0, 0, 0, 0.4),
                inset 2px 2px 5px rgba(255, 255, 255, 0.2);
            overflow: hidden;
            animation: rotateEarth 20s linear infinite;
        }

        .earth-continents {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(ellipse 30px 15px at 20% 30%, #228b22 0%, transparent 70%),
                radial-gradient(ellipse 25px 20px at 70% 40%, #228b22 0%, transparent 70%),
                radial-gradient(ellipse 20px 15px at 50% 70%, #228b22 0%, transparent 70%),
                radial-gradient(ellipse 15px 10px at 30% 55%, #228b22 0%, transparent 70%);
            background-size: 100% 100%;
            background-position: 0 0;
        }

        .earth-atmosphere {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 30%, rgba(135, 206, 235, 0.4), transparent 50%);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        @keyframes rotateEarth {
            from {
                transform: rotateY(0deg) rotateX(20deg);
            }
            to {
                transform: rotateY(360deg) rotateX(20deg);
            }
        }

        /* Glow effects */
        .glow {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.5), transparent);
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(138, 43, 226, 0.5);
            }
            50% {
                box-shadow: 0 0 40px rgba(138, 43, 226, 0.8);
            }
        }

        /* Info text */
        .info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #87ceeb;
            font-size: 14px;
            text-shadow: 0 0 10px rgba(138, 43, 226, 0.8);
            z-index: 10;
            max-width: 300px;
        }

        .info h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 20px rgba(138, 43, 226, 1);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Nebula Background -->
        <div class="nebula"></div>

        <!-- Star Layers (Parallax) -->
        <div class="stars-layer"></div>
        <div class="stars-layer layer-2"></div>
        <div class="stars-layer layer-3"></div>

        <!-- Space Telescope -->
        <div class="telescope">
            <div class="telescope-body">
                <div class="telescope-tube">
                    <div class="telescope-mirror"></div>
                </div>
                <div class="telescope-stand"></div>
            </div>
        </div>

        <!-- Rotating Earth -->
        <div class="earth-container">
            <div class="earth-continents"></div>
            <div class="earth-atmosphere"></div>
        </div>

        <!-- Info Section -->
        <div class="info">
            <h1>✨ Space Explorer ✨</h1>
            <p>Watch the cosmic dance of stars, planets, and telescopes across the endless void of space.</p>
        </div>
    </div>

    <script>
        const container = document.querySelector('.container');
        
        // Shooting Stars Generation
        function createShootingStar() {
            const star = document.createElement('div');
            star.className = 'shooting-star';
            
            // Random starting position
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight * 0.6; // Upper 60% of screen
            
            star.style.left = startX + 'px';
            star.style.top = startY + 'px';
            
            container.appendChild(star);
            
            // Animate the shooting star
            const duration = 1.5 + Math.random() * 1; // 1.5-2.5 seconds
            const distance = 200 + Math.random() * 200; // 200-400px
            
            star.animate([
                { 
                    transform: 'translate(0, 0) scale(1)',
                    opacity: 1
                },
                { 
                    transform: `translate(${distance}px, ${distance}px) scale(0.5)`,
                    opacity: 0
                }
            ], {
                duration: duration * 1000,
                easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)'
            }).onfinish = () => {
                star.remove();
            };
        }
        
        // Create shooting stars at intervals
        setInterval(createShootingStar, 2000);
        
        // Create initial shooting stars
        for (let i = 0; i < 3; i++) {
            setTimeout(createShootingStar, i * 800);
        }
        
        // Add some floating glow orbs
        function createGlowOrb() {
            const glow = document.createElement('div');
            glow.className = 'glow';
            
            const size = 50 + Math.random() * 100;
            glow.style.width = size + 'px';
            glow.style.height = size + 'px';
            glow.style.left = Math.random() * window.innerWidth + 'px';
            glow.style.top = Math.random() * window.innerHeight + 'px';
            glow.style.opacity = Math.random() * 0.3 + 0.1;
            
            container.appendChild(glow);
            
            // Float animation
            const duration = 15 + Math.random() * 10;
            glow.animate([
                { transform: 'translateY(0px)' },
                { transform: 'translateY(-100px)' },
                { transform: 'translateY(0px)' }
            ], {
                duration: duration * 1000,
                easing: 'ease-in-out',
                iterations: Infinity
            });
            
            // Remove after some time to prevent memory leak
            setTimeout(() => glow.remove(), duration * 3000);
        }
        
        // Create initial glow orbs
        for (let i = 0; i < 5; i++) {
            setTimeout(createGlowOrb, i * 1000);
        }
        
        // Create new glow orbs periodically
        setInterval(createGlowOrb, 5000);
    </script>
</body>
</html>
